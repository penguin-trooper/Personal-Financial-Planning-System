<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&family=Alegreya+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

         <link rel="stylesheet" href="../styles.css">


  <title>User Flow Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-dark moneta-section">
        <div class="container-fluid px-4">

            <!-- Brand name -->
            <a href="#" class="navbar-brand">Moneta</a>

            <!-- Toggler for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#monetaNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav links -->
            <div class="collapse navbar-collapse" id="monetaNavbar">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a href="../home-page.html" class="nav-link moneta-section-text active">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="../investment-strategy.html" class="nav-link moneta-section-text">Financial Planner</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link moneta-section-text">ROI Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link moneta-section-text">Market Insights</a>
                    </li>
                </ul>

                <!-- Username + Profile icon -->
                <div class="dropdown d-flex align-items-center gap-2">
                    <span class="moneta-section-text">User Name</span>

                    <a href="#" class="dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown"
                        aria-expanded="false" style="text-decoration: none;">
                        <div class="profile-icon">
                            <img src="../images/profile.svg" alt="Profile" width="20" height="20">
                        </div>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end moneta-dropdown">
                        <li>
                            <a href="profile.html" class="dropdown-item">
                                <img src="../images/settings.svg" alt="" width="16" height="16" class="me-2">
                                Account Settings
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a href="#" class="dropdown-item">
                                <img src="../images/log_out.svg" alt="" width="16" height="16" class="me-2">
                                Log Out
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
  <div class="custom-container">
    <!-- User Setting -->
    <div class="card" id="user-setting">
      <h2>User Setting</h2>
      <div class="user-box">
        <label>Username</label>
        <input type="text" value="JohnDoe" disabled>
        <label>Email</label>
        <input type="email" value="john@example.com" disabled>
        <div class="buttons">
          <button class="edit">Edit</button>
          <button class="delete">Delete</button>
        </div>
      </div>
    </div>

  <!-- Edit User -->
<div class="card" id="edit-user" style="display:none;">
  <h2>Edit User</h2>
  <div class="user-box">
    <label>Username</label>
    <input type="text" id="edit-username" value="JohnDoe">
    <label>Email</label>
    <input type="email" id="edit-email" value="john@example.com">
    
    <!-- Only Change Password button, centered -->
    <div class="buttons" style="justify-content: center;">
      <button class="yellow" id="change-password">Change Password</button>
    </div>
    
    <div class="buttons">
      <button class="save">Save</button>
      <button class="cancel">Cancel</button>
    </div>
  </div>
</div>


  <script src="script.js"></script>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
