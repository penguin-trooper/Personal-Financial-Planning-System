<!DOCTYPE html>
<html>
<head>
    <title>New Credentials - Moneta</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="left">
        <h1>MONETA</h1>
        <h3>New Credentials</h3>
        
        <form action="/reset-password-final" method="POST">
            <!-- Label is OUTSIDE the container -->
            <label>Create Password</label> 
            <div class="password-container">
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="Password" 
                    required 
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*(),.?&quot;:{}|<>]).+$"
                    title="Must contain at least, one uppercase letter and one symbol."
                >
            </div>
            
            <label>Confirm Password</label>
            <div class="password-container">
                <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" required>
            </div>

            <p id="error-msg" style="color: red; font-size: 12px; font-weight: bold; margin-top: 10px;"></p>

            <button type="submit" class="btn-teal">Confirm</button>
        </form>
    </div>
    <div class="right"></div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const msgBox = document.getElementById('error-msg');

    if (error === 'weak') {
        msgBox.innerText = "Password is too weak! Use 1 capital, 1 lowercase, and 1 symbol.";
    } else if (error === 'match') {
        msgBox.innerText = "Passwords do not match!";
    } else if (error === 'server') {
        msgBox.innerText = "Internal server error. Please try again.";
    }
</script>
</body>
</html>
