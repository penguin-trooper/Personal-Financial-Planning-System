<!DOCTYPE html>
<html>
<head>
    <title>Create Password - Moneta</title>
    <link rel="stylesheet" href="/style.css">
    <!-- Add Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .password-container { position: relative; width: 100%; }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #548c94;
            z-index: 10;
        }
        input[type="password"], input[type="text"] { padding-right: 40px; }
    </style>
</head>
<body>
<div class="container">
    <div class="left">
        <h1>MONETA</h1>
        <div class="tabs">
            <span onclick="window.location.href='/login.html'">LOG IN</span>
            <span class="active">SIGN UP</span>
        </div>
        
        <form action="/signup-password" method="POST">
            <label>Create Password</label>
            <div class="password-container">
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    placeholder="Password" 
                    required 
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*(),.?&quot;:{}|<>]).+$"
                    title="Must contain at least one capital letter, one lowercase letter, and one symbol."
                >
                <i class="fa-solid fa-eye-slash toggle-password" onclick="toggleVisibility('password', this)"></i>
            </div>
            
            <label>Confirm Password</label>
            <div class="password-container">
                <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" required>
                <i class="fa-solid fa-eye-slash toggle-password" onclick="toggleVisibility('confirm', this)"></i>
            </div>

            <p id="error-msg" style="color: red; font-size: 12px; font-weight: bold; margin-top: 10px;"></p>
            <button type="submit" class="btn-teal">Confirm</button>
        </form>
    </div>
    <div class="right"></div>
</div>

<script>
    function toggleVisibility(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.classList.replace("fa-eye-slash", "fa-eye");
        } else {
            input.type = "password";
            el.classList.replace("fa-eye", "fa-eye-slash");
        }
    }

    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const msgBox = document.getElementById('error-msg');

    if (error === 'weak') {
        msgBox.innerText = "Password is too weak! Use one uppercase and one symbol.";
    } else if (error === 'match') {
        msgBox.innerText = "Passwords do not match!";
    } else if (error === 'server') {
        msgBox.innerText = "Internal server error. Please try again.";
    }
</script>
</body>
</html>
