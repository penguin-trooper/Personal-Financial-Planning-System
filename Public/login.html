<!DOCTYPE html>
<html>
<head>
    <title>Login - Moneta</title>
    <link rel="stylesheet" href="/style.css">
    <!-- 1. Add Font Awesome for the eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>MONETA</h1>

        <div class="tabs">
            <span class="active">LOG IN</span>
            <span onclick="window.location.href='/signup.html'">SIGN UP</span>
        </div>

        <form action="/login" method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>
            
            <label>Password</label>
            <div class="password-container">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <i class="fa-solid fa-eye-slash toggle-password" onclick="toggleVisibility('password', this)"></i>
            </div>

            <div class="link">
                <a href="/forgot.html">Forgot password?</a>
            </div>

            <div class="button-row">
                <button type="submit" class="btn-teal">Log In</button>

                <span class="divider">or</span>

                <button type="button" class="google-btn" onclick="window.location.href='/auth/google'">
                    <img src="https://developers.google.com/identity/images/g-logo.png" width="18">
                    Log In
                </button>
            </div>            
            
            <p id="errorMsg" style="color:red; font-size: 12px; font-weight: bold; margin-top: 10px;"></p>
            
        </form>
    </div>

    <div class="right"></div>

</div>

<script>
function toggleVisibility(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        el.classList.replace("fa-eye-slash", "fa-eye");
    } else {
        input.type = "password";
        el.classList.replace("fa-eye", "fa-eye-slash");
    }
}

// Handle error messages from URL parameters
const params = new URLSearchParams(window.location.search);
const error = params.get('error');
const msgBox = document.getElementById('errorMsg');

if (error === 'user') {
    msgBox.innerText = "User not found.";
} else if (error === 'password') {
    msgBox.innerText = "Wrong password.";
} else if (error === 'server') {
    msgBox.innerText = "Something went wrong. Try again.";
}
</script>

</body>
</html>
