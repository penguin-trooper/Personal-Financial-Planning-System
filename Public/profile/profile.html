<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&family=Alegreya+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/styles.css">


    <title>Moneta - Profile Settings</title>
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg moneta-navbar sticky-top" id="mainNavbar">
        <div class="container-fluid px-4">

            <!-- Brand / Logo -->
            <a class="navbar-brand" href="../home-page.html">
                Moneta
            </a>

            <!-- Mobile Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible Nav Links -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarContent">
                <ul class="navbar-nav gap-1">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="../home-page.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../Financial_planner.html">Financial Planner</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../roi-calculator.html">ROI Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../market-insight.html">Market Insights</a>
                    </li>
                </ul>
            </div>

            <!-- User profile dropdown -->
            <div class="d-flex align-items-center gap-2">
                <span class="nav-username d-none d-lg-inline">User Name</span>
                <div class="dropdown">
                    <button class="nav-avatar-btn" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-fill"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end moneta-dropdown-menu" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item" href="profile.html"><i class="bi bi-gear"></i> Settings</a></li>
                        <li>
                            <hr class="dropdown-divider" style="border-color:rgba(255,255,255,0.15);">
                        </li>
                        <li><a class="dropdown-item" href="/logout"><i class="bi bi-box-arrow-right"></i>
                                Log Out</a></li>
                    </ul>
                </div>
            </div>

        </div>
    </nav>
    <div class="custom-container">
        <!-- User Setting -->
        <div class="card" id="user-setting">
            <h2>User Setting</h2>
            <div class="user-box">
                <label>Username</label>
                <input type="text" value="JohnDoe" disabled>
                <label>Email</label>
                <input type="email" value="john@example.com" disabled>
                <div class="buttons">
                    <button class="edit">Edit</button>
                    <button class="delete">Delete</button>
                </div>
            </div>
        </div>

        <!-- Edit User -->
        <div class="card" id="edit-user" style="display:none;">
            <h2>Edit User</h2>
            <div class="user-box">
                <label>Username</label>
                <input type="text" id="edit-username" value="JohnDoe">
                <label>Email</label>
                <input type="email" id="edit-email" value="john@example.com">

                <!-- Only Change Password button, centered -->
                <div class="buttons" style="justify-content: center;">
                    <button class="yellow" id="change-password">Change Password</button>
                </div>

                <div class="buttons">
                    <button class="save">Save</button>
                    <button class="cancel">Cancel</button>
                </div>
            </div>
        </div>


        <script src="../js/profile.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
